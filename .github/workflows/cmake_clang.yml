name: Clang DuckDB

on:
  push:
    branches:
      - main  # Trigger on push 
  pull_request:
    branches:
      - main   # Trigger on pull 

jobs:
  build:
    runs-on: ubuntu-latest  # Use Ubuntu environment for the build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Checkout the repository code

    - name: Download DuckDB
      run: |
        wget https://github.com/duckdb/duckdb/releases/download/v1.4.3/libduckdb-linux-amd64.zip
        unzip libduckdb-linux-amd64.zip -d DuckDB

    - name: Configure CMake with Clang
      run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++  # Configure CMake with Clang as the compiler

    - name: Build
      run: cmake --build build  # Build the project using CMake

    - name: Run Async-DuckDBApp
      run: ./build/Async-DuckDBApp  # Run the built executable
